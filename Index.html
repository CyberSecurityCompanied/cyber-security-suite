<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Security Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

/* Animated Background */
.background {
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
    animation: moveBg 15s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    100% { transform: translate(-25%, -25%); }
}

header {
    text-align: center;
    padding: 80px 20px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: #00ffcc;
    margin-bottom: 20px;
}

h1 {
    font-size: 48px;
    color: #00ffcc;
}

.button {
    display: inline-block;
    margin: 15px;
    padding: 15px 30px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    box-shadow: 0 0 20px #00ffcc;
    transition: 0.3s;
}

.button:hover {
    background: #00ccaa;
    box-shadow: 0 0 40px #00ffcc;
}

section {
    padding: 60px 20px;
    text-align: center;
}

.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,255,204,0.2);
}

.gallery img {
    width: 300px;
    margin: 10px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,255,204,0.3);
}

footer {
    padding: 30px;
    text-align: center;
    color: #94a3b8;
}

.contact {
    margin-top: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    border: none;
}

</style>
</head>
<body>

<div class="background"></div>

<header>
    <div class="logo">🔐 Cyber Security Suite</div>
    <h1>Modern Password Security Platform</h1>
    <a href="CyberSecuritySuiteSetup.exe" class="button">⬇ Download Installer</a>
</header>

<section>
    <h2>Features</h2>
    <div class="features">
        <div class="card">⚡ Real-Time Password Analysis</div>
        <div class="card">📊 Entropy & Crack Time Estimation</div>
        <div class="card">🖥 Modern Cyber Dashboard</div>
        <div class="card">📁 Professional Installer Support</div>
    </div>
</section>

<section class="gallery">
    <h2>Screenshots</h2>
    <img src="app-screenshot.png" alt="app-screenshot">
    <img src="css-screenshot2.png" alt="css-screenshot2">
</section>

<footer>
    © 2026 Cyber Security Suite | All Rights Reserved
    <br>
    Version 1.0.0
</footer>

</body>
</html>
